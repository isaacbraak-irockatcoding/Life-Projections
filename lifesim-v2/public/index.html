<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LifeSim Finance</title>
  <link rel="icon" type="image/jpeg" href="/images/logo.jpeg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ═══════════════ APP HEADER ═══════════════ -->
<header class="app-header" id="app-header" style="display:none;">
  <img src="/images/logo.jpeg" alt="LifeSim Finance" style="height:32px;object-fit:contain;border-radius:6px;"/>
  <button class="save-btn" id="save-btn" onclick="State.save().then(()=>showToast('Saved'))">Saved</button>
</header>

<!-- ═══════════════ AUTH SCREEN ═══════════════ -->
<div id="screen-auth"></div>

<!-- ═══════════════ PROJECTIONS SCREEN ═══════════════ -->
<div id="screen-proj" style="display:none;">
  <!-- Scenario chips live outside the container so they go edge-to-edge -->
  <div class="scenario-chips" id="scenario-chips"></div>

  <div class="container">
    <div id="scenario-editors"></div>

    <div id="proj-stats"></div>
    <div id="proj-breakeven"></div>

    <div class="card">
      <div class="chart-hdr">
        <h3 style="margin-bottom:0;">Wealth Projection</h3>
        <div style="display:flex;gap:6px;align-items:center;">
          <div class="range-btns">
            <button id="view-btn-chart"    onclick="setViewMode('chart')"    class="range-btn active">📈 Chart</button>
            <button id="view-btn-table"    onclick="setViewMode('table')"    class="range-btn">⊞ Table</button>
            <button id="view-btn-cashflow" onclick="setViewMode('cashflow')" class="range-btn">≋ Cashflow</button>
          </div>
          <div class="range-btns">
            <button onclick="setProjRange(5)"    id="rb-5"   class="range-btn">5y</button>
            <button onclick="setProjRange(10)"   id="rb-10"  class="range-btn">10y</button>
            <button onclick="setProjRange(20)"   id="rb-20"  class="range-btn">20y</button>
            <button onclick="setProjRange(null)" id="rb-all" class="range-btn active">All</button>
          </div>
          <div class="range-btns">
            <button id="compare-btn" onclick="toggleCompareMode()" class="range-btn">⊞ Compare</button>
          </div>
        </div>
      </div>
      <canvas id="projChart" height="240"></canvas>
      <div id="proj-table" style="display:none;"></div>
      <div id="proj-cashflow" style="display:none;"></div>
      <div class="legend" id="proj-legend"></div>
      <div style="display:flex;justify-content:center;margin-top:10px;">
        <button id="animate-btn" onclick="toggleAnimateMode()" class="range-btn">▶ Animate</button>
      </div>
    </div>
  </div>
</div>


<!-- ═══════════════ SHARE SCREEN ═══════════════ -->
<div id="screen-share" style="display:none;">
  <div class="container">
    <div id="share-content"></div>
  </div>
</div>

<!-- ═══════════════ FRIENDS SCREEN ═══════════════ -->
<div id="screen-friends" style="display:none;">
  <div class="container">
    <div id="friends-content"></div>
  </div>
</div>

<!-- ═══════════════ EXPLORE SCREEN ═══════════════ -->
<div id="screen-explore" style="display:none;">
  <div class="container">
    <div id="explore-content"></div>
  </div>
</div>

<!-- ═══════════════ CONTACT FOOTER ═══════════════ -->
<footer class="app-footer" id="app-footer" style="display:none;">
  <a href="mailto:Lifesimfinance@gmail.com">Lifesimfinance@gmail.com</a>
</footer>

<!-- ═══════════════ BOTTOM NAV ═══════════════ -->
<nav class="nav" id="main-nav" style="display:none;">
  <div class="nav-item" id="nav-proj"    onclick="switchTab('proj')">
    <span class="nav-icon">📈</span>Projections
  </div>
  <div class="nav-item" id="nav-share"   onclick="switchTab('share')">
    <span class="nav-icon">🔗</span>Share
  </div>
  <div class="nav-item" id="nav-friends" onclick="switchTab('friends')">
    <span class="nav-icon">👥</span>Friends
  </div>
  <div class="nav-item" id="nav-explore" onclick="switchTab('explore')">
    <span class="nav-icon">🧭</span>Explore
  </div>
</nav>

<!-- Script load order is strict -->
<script src="/js/data.js?v=2"></script>
<script src="/js/api.js"></script>
<script src="/js/state.js"></script>
<script src="/js/engine.js"></script>
<script src="/js/projections.js"></script>
<script src="/js/events.js"></script>
<script src="/js/assets.js"></script>
<script src="/js/debts.js"></script>
<script src="/js/share.js"></script>
<script src="/js/friends.js"></script>
<script src="/js/groups.js"></script>
<script src="/js/explore.js"></script>
<script src="/js/auth.js"></script>
<script>
  // Toast utility
  function showToast(msg, isError = false) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const el = document.createElement('div');
    el.className = 'toast' + (isError ? ' error' : '');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2700);
  }

</script>
<script src="/js/nav.js"></script>

<script>
  // Falling money animation — only visible on screens wider than 540px
  (function initMoneyRain() {
    const SYMBOLS = ['$', '💵', '💰', '💲', '$', '$', '💵'];
    const COLORS  = ['#00d4aa', '#f0a040', '#a78bfa', '#38bdf8', '#dde3f5'];

    function createPanel(side) {
      const el = document.createElement('div');
      el.className = `money-rain-panel ${side}`;
      document.body.appendChild(el);
      return el;
    }

    function spawnSymbol(panel) {
      const panelW = panel.offsetWidth;
      if (panelW < 10) return; // don't spawn if panel is too narrow

      const el       = document.createElement('span');
      el.className   = 'money-symbol';
      el.textContent = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
      el.style.left     = Math.random() * Math.max(0, panelW - 30) + 'px';
      el.style.color    = COLORS[Math.floor(Math.random() * COLORS.length)];
      el.style.fontSize = (14 + Math.random() * 16) + 'px';
      const duration    = 4 + Math.random() * 8;
      el.style.animationDuration = duration + 's';
      el.style.animationDelay   = (Math.random() * -duration) + 's'; // stagger start positions
      panel.appendChild(el);

      // Remove element after a few cycles to avoid DOM bloat
      setTimeout(() => el.remove(), (duration + 2) * 1000);
    }

    const leftPanel  = createPanel('left');
    const rightPanel = createPanel('right');

    function tick() {
      if (leftPanel.offsetWidth >= 10) {
        spawnSymbol(leftPanel);
        spawnSymbol(rightPanel);
      }
    }

    // Spawn a new symbol every ~600ms on each side
    setInterval(tick, 600);
    // Seed initial batch so it doesn't look empty on load
    for (let i = 0; i < 10; i++) {
      setTimeout(() => { spawnSymbol(leftPanel); spawnSymbol(rightPanel); }, i * 200);
    }
  })();
</script>
</body>
</html>
