<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LifeSim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ═══════════════ APP HEADER ═══════════════ -->
<header class="app-header" id="app-header" style="display:none;">
  <span class="app-header-title">LifeSim</span>
  <button class="save-btn" id="save-btn" onclick="State.save().then(()=>showToast('Saved'))">Saved</button>
</header>

<!-- ═══════════════ AUTH SCREEN ═══════════════ -->
<div id="screen-auth"></div>

<!-- ═══════════════ PROJECTIONS SCREEN ═══════════════ -->
<div id="screen-proj" style="display:none;">
  <!-- Scenario chips live outside the container so they go edge-to-edge -->
  <div class="scenario-chips" id="scenario-chips"></div>

  <div class="container">
    <div class="card">
      <div class="chart-hdr">
        <h3 style="margin-bottom:0;">Wealth Projection</h3>
      </div>
      <canvas id="projChart" height="240"></canvas>
      <div class="legend" id="proj-legend"></div>
    </div>

    <div id="proj-stats"></div>
    <div id="proj-breakeven"></div>

    <div id="scenario-editors"></div>
  </div>
</div>

<!-- ═══════════════ MONTE CARLO SCREEN ═══════════════ -->
<div id="screen-mc" style="display:none;">
  <div class="container">
    <div class="card">
      <div class="chart-hdr">
        <h3 style="margin-bottom:0;">Monte Carlo</h3>
        <span class="micro" id="mc-sim-label">1,000 simulations</span>
      </div>

      <div id="mc-scenario-btns" class="btn-row" style="margin-bottom:14px;"></div>

      <canvas id="mcChart" height="240"></canvas>

      <div style="margin-top:14px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <label class="micro">Return Volatility</label>
          <span class="micro num" id="vol-label">12%</span>
        </div>
        <input type="range" id="vol-slider" min="2" max="30" value="12"
          oninput="updateMcVolatility(this.value)"/>
      </div>
    </div>

    <div class="card card-alt">
      <div id="mc-prob-bars"></div>
    </div>

    <button class="btn btn-ghost" style="margin-top:4px;" onclick="runMonteCarlo()">
      ▶ Run Simulation
    </button>

    <div class="disclaimer" style="margin-top:14px;">
      ⚠️ <span>Monte Carlo uses randomised annual returns with the selected volatility. Past performance does not predict future results.</span>
    </div>
  </div>
</div>

<!-- ═══════════════ SHARE SCREEN ═══════════════ -->
<div id="screen-share" style="display:none;">
  <div class="container">
    <div id="share-content"></div>
  </div>
</div>

<!-- ═══════════════ FRIENDS SCREEN ═══════════════ -->
<div id="screen-friends" style="display:none;">
  <div class="container">
    <div id="friends-content"></div>
  </div>
</div>

<!-- ═══════════════ BOTTOM NAV ═══════════════ -->
<nav class="nav" id="main-nav" style="display:none;">
  <div class="nav-item" id="nav-proj"    onclick="switchTab('proj')">
    <span class="nav-icon">📈</span>Projections
  </div>
  <div class="nav-item" id="nav-mc"      onclick="switchTab('mc')">
    <span class="nav-icon">📊</span>Monte Carlo
  </div>
  <div class="nav-item" id="nav-share"   onclick="switchTab('share')">
    <span class="nav-icon">🔗</span>Share
  </div>
  <div class="nav-item" id="nav-friends" onclick="switchTab('friends')">
    <span class="nav-icon">👥</span>Friends
  </div>
</nav>

<!-- Script load order is strict -->
<script src="/js/data.js"></script>
<script src="/js/api.js"></script>
<script src="/js/state.js"></script>
<script src="/js/engine.js"></script>
<script src="/js/projections.js"></script>
<script src="/js/montecarlo.js"></script>
<script src="/js/events.js"></script>
<script src="/js/assets.js"></script>
<script src="/js/debts.js"></script>
<script src="/js/share.js"></script>
<script src="/js/friends.js"></script>
<script src="/js/auth.js"></script>
<script>
  // Toast utility
  function showToast(msg, isError = false) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const el = document.createElement('div');
    el.className = 'toast' + (isError ? ' error' : '');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2700);
  }

</script>
<script src="/js/nav.js"></script>
</body>
</html>
